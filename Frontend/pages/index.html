<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Sistema de detecção médica com YOLO — rim, tumor e cisto renal"/>
  <title>Medical Detector — YOLO</title>
  <link rel="stylesheet" href="static/style/index.css"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a6fc4'/><rect x='13' y='6' width='6' height='20' rx='2' fill='white'/><rect x='6' y='13' width='20' height='6' rx='2' fill='white'/></svg>"/>
</head>
<body>

<!-- HEADER -->
<header role="banner">
  <div class="logo-mark" aria-hidden="true">MD</div>
  <div class="header-title">
    <h1>Medical <span>Detector</span></h1>
    <span class="header-sub">RENAI · Detecção renal por YOLO</span>
  </div>
  <div class="status-pill" id="statusPill" role="status" aria-live="polite">
    <div class="dot" aria-hidden="true"></div>
    <span id="statusText">conectando...</span>
  </div>
</header>

<!-- MAIN -->
<main role="main">

  <!-- Painel esquerdo -->
  <section class="panel-left" aria-label="Envio de imagem e controles">

    <!-- Zona de upload e preview unificada -->
    <div class="upload-zone" id="uploadZone"
         role="button" tabindex="0"
         aria-label="Área de upload. Clique ou arraste uma imagem">

      <!-- Input sempre presente e invisível -->
      <input type="file" id="fileInput"
             accept="image/*,.dcm"
             onchange="onFile(this)"
             aria-label="Selecionar arquivo de imagem"/>

      <!-- Estado inicial: placeholder -->
      <div class="upload-placeholder" id="uploadPlaceholder">
        <div class="upload-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <p class="upload-title"><strong>Clique ou arraste</strong> uma imagem</p>
        <p class="upload-sub">PNG · JPG · TIFF · DICOM</p>
      </div>

      <!-- Preview da imagem (oculto até carregar) -->
      <img id="previewImg" class="preview-img" src="" alt=""/>

      <!-- Overlay de troca (aparece no hover quando tem imagem) -->
      <div class="preview-overlay" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Clique ou arraste para trocar
      </div>

    </div>

    <!-- Label do arquivo carregado -->
    <div class="file-info" id="fileInfo" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      <span id="fileInfoText">—</span>
    </div>

    <!-- Controles -->
    <div class="controls" role="group" aria-label="Parâmetros de detecção">

      <div class="controls-card">
        <div class="slider-group">
          <label for="confSlider">
            Confiança mínima
            <span id="confVal">15%</span>
          </label>
          <input type="range" id="confSlider"
                 min="5" max="90" value="15" step="1"
                 aria-valuemin="5" aria-valuemax="90" aria-valuenow="15"
                 oninput="updateSlider('confSlider','confVal',this.value+'%')"/>
        </div>

        <div class="slider-group">
          <label for="iouSlider">
            IoU threshold
            <span id="iouVal">50%</span>
          </label>
          <input type="range" id="iouSlider"
                 min="10" max="90" value="50" step="1"
                 aria-valuemin="10" aria-valuemax="90" aria-valuenow="50"
                 oninput="updateSlider('iouSlider','iouVal',this.value+'%')"/>
        </div>
      </div>

      <button class="btn-predict" id="btnPredict"
              onclick="predict()" disabled>
        <div class="spinner" id="spinner" aria-hidden="true"></div>
        <span id="btnLabel">Selecione uma imagem</span>
      </button>

    </div>
  </section>

  <!-- Painel direito -->
  <aside class="panel-right" aria-label="Resultados da detecção">

    <div class="panel-right-header">
      <h2>Detecções</h2>
      <div class="badge-total" id="badgeTotal" aria-live="polite">—</div>
    </div>

    <div class="results-list" id="resultsList" role="list" aria-live="polite">
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="11" y1="8" x2="11" y2="14"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
        <p>Faça upload de uma imagem<br/>e clique em <strong>Analisar</strong>.</p>
      </div>
    </div>

    <div class="summary-panel" id="summaryPanel"
         style="display:none" aria-label="Resumo por classe">
      <p class="summary-title">resumo por classe</p>
      <div class="summary-classes" role="list">
        <div class="cls-stat" role="listitem" style="border-top:3px solid var(--rim)">
          <div class="cls-num" id="sumRim" style="color:var(--rim)">0</div>
          <div class="cls-lbl">Rim</div>
        </div>
        <div class="cls-stat" role="listitem" style="border-top:3px solid var(--tumor)">
          <div class="cls-num" id="sumTumor" style="color:var(--tumor)">0</div>
          <div class="cls-lbl">Tumor</div>
        </div>
        <div class="cls-stat" role="listitem" style="border-top:3px solid var(--cisto)">
          <div class="cls-num" id="sumCisto" style="color:var(--cisto)">0</div>
          <div class="cls-lbl">Cisto</div>
        </div>
      </div>
    </div>

  </aside>
</main>

<!-- FOOTER -->
<footer role="contentinfo">
  <span>github · YuriSantt0s</span>
  <span id="footerInfo">localhost:8000</span>
</footer>

<!-- Toast -->
<div class="toast" id="toast" role="alert" aria-live="assertive">
  <span class="toast-icon" aria-hidden="true">⚠</span>
  <span id="toastMsg"></span>
</div>

<style>
  .sr-only {
    position:absolute;width:1px;height:1px;
    padding:0;margin:-1px;overflow:hidden;
    clip:rect(0,0,0,0);white-space:nowrap;border:0;
  }
</style>

<script src="static/script/index.js"></script>
</body>
</html>
