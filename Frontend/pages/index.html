<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YOLO Medical Detector</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  
  <link rel="stylesheet" href="static/style/index.css"/>
</head>

<body>

<header>
  <div class="logo-mark">YL</div>
  <h1>Medical <span>Detector</span></h1>

  <div class="status-pill" id="statusPill">
    <div class="dot"></div>
    <span id="statusText">conectando...</span>
  </div>
</header>

<main>

  <div class="panel-left">

    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept="image/*" onchange="onFile(this)"/>

      <div class="upload-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>

      <p><strong>Clique ou arraste</strong> uma imagem</p>
      <p style="margin-top:5px;font-size:11px">PNG · JPG · 8-bit</p>
    </div>

    <div class="preview-wrap" id="previewWrap">
      <img id="previewImg" src="" alt="preview"/>
    </div>

    <div class="controls">

      <div class="slider-group">
        <label>
          Confiança mínima
          <span id="confVal">15%</span>
        </label>

        <input
          type="range"
          id="confSlider"
          min="5"
          max="90"
          value="15"
          oninput="document.getElementById('confVal').textContent=this.value+'%'"
        />
      </div>

      <div class="slider-group">
        <label>
          IoU threshold
          <span id="iouVal">50%</span>
        </label>

        <input
          type="range"
          id="iouSlider"
          min="10"
          max="90"
          value="50"
          oninput="document.getElementById('iouVal').textContent=this.value+'%'"
        />
      </div>

      <button class="btn-predict" id="btnPredict" onclick="predict()" disabled>
        <div class="spinner" id="spinner"></div>
        <span id="btnLabel">Selecione uma imagem</span>
      </button>

    </div>
  </div>

  <div class="panel-right">

    <div class="panel-right-header">
      <h2>Detecções</h2>
      <div class="badge-total" id="badgeTotal">—</div>
    </div>

    <div class="results-list" id="resultsList">
      <div class="empty-state">

        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="11" y1="8" x2="11" y2="14"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
        </svg>

        <p>
          Faça upload de uma imagem<br/>
          e clique em Analisar.
        </p>

      </div>
    </div>

    <div class="summary-panel" id="summaryPanel" style="display:none">

      <div class="summary-title">resumo por classe</div>

      <div class="summary-classes">

        <div class="cls-stat">
          <div class="cls-num" id="sumRim" style="color:var(--rim)">0</div>
          <div class="cls-lbl">rim</div>
        </div>

        <div class="cls-stat">
          <div class="cls-num" id="sumTumor" style="color:var(--tumor)">0</div>
          <div class="cls-lbl">tumor</div>
        </div>

        <div class="cls-stat">
          <div class="cls-num" id="sumCisto" style="color:var(--cisto)">0</div>
          <div class="cls-lbl">cisto</div>
        </div>

      </div>
    </div>
  </div>
</main>

<footer>
  <span>YOLO Medical Detector</span>
  <span id="footerInfo">localhost:8000</span>
</footer>

<div class="toast" id="toast"></div>

<script src="static/script/index.js"></script>

</body>
</html>
